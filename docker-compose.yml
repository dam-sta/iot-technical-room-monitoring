services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "127.0.0.1:1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  sensor-simulator:
    build:
      context: ./sensor-simulator
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: mosquitto

  backend:
    build:
      context: ./backend
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: mosquitto
    ports:
      - "127.0.0.1:8000:8000"
