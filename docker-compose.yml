services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  sensor-simulator:
    build:
      context: ./sensor-simulator
    container_name: iot-sensor-simulator
    depends_on:
      - mosquitto
    restart: unless-stopped