services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "127.0.0.1:1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: iot_monitoring
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_password
    volumes:
      - postgres-data:/var/lib/postgresql

  sensor-simulator:
    build:
      context: ./sensor-simulator
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: mosquitto

  backend:
    build:
      context: ./backend
    depends_on:
      - mosquitto
      - postgres
    environment:
      MQTT_HOST: mosquitto
      DATABASE_URL: postgresql://iot_user:iot_password@postgres:5432/iot_monitoring
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  postgres-data:
